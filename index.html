<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aleee - 博客</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(120deg, #f0e4ff 0%, #e0f2ff 100%);
            position: relative;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        
        .wallpaper-carousel {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -2;
            overflow: hidden;
        }
        
        .wallpaper-slide {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            transition: opacity 2s ease-in-out;
        }
        
        .wallpaper-slide.active { opacity: 1; }
        
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            z-index: -1;
        }
        
        .glow-sphere {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            transition: transform 1s cubic-bezier(0.23, 1, 0.32, 1);
            pointer-events: none;
        }
        .sphere-1 { width: 600px; height: 600px; background: #ffcdd2; top: -150px; right: -150px; }
        .sphere-2 { width: 500px; height: 500px; background: #c8e6c9; bottom: -100px; left: -100px; }

        .apple-glass {
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(30px) saturate(160%);
            -webkit-backdrop-filter: blur(30px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.05);
        }
        
        .apple-glass-strong {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        .dynamic-nav-container {
            transition: all 0.8s cubic-bezier(0.2, 1, 0.2, 1);
            will-change: width, transform, padding, border-radius;
        }

        .scroll-container {
            height: calc(100vh - 100px);
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 20px;
        }
        .scroll-container::-webkit-scrollbar { display: none; }
        
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            z-index: 1;
        }
        
        .three-column-layout {
            display: grid;
            grid-template-columns: 260px 1fr 260px;
            gap: 1rem;
            flex: 1;
            overflow: hidden;
            padding: 0 1rem;
        }
        
        .sidebar-column {
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .sidebar-column::-webkit-scrollbar { display: none; }

        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1s ease, transform 0.8s cubic-bezier(0.2, 1, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        .gradient-text-vibrant {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .text-ios-blue { color: #007AFF; }
        
        .status-dot {
            width: 10px;
            height: 10px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .subcategory-card {
            padding: 0.4rem 0.6rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        
        .subcategory-card:hover {
            background: rgba(255, 255, 255, 0.8);
            color: #007AFF;
        }
        
        .post-meta-item {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 999px;
            font-size: 0.8rem;
            color: #718096;
        }
        
        .tag-cloud {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        
        .tag-cloud-item {
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #4a5568;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        
        .tag-cloud-item:hover {
            background: rgba(0, 122, 255, 0.2);
            border-color: rgba(0, 122, 255, 0.5);
            color: #007AFF;
        }
        
        body.dark-mode { color: #e2e8f0; }
        body.dark-mode .apple-glass { background: rgba(26, 32, 44, 0.8); border-color: rgba(74, 85, 104, 0.3); }
        body.dark-mode .apple-glass-strong { background: rgba(26, 32, 44, 0.9); border-color: rgba(74, 85, 104, 0.4); }
        body.dark-mode .gradient-text-vibrant { background: linear-gradient(135deg, #63b3ed 0%, #805ad5 50%, #d53f8c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        body.dark-mode .text-gray-800 { color: #e2e8f0; }
        body.dark-mode .text-gray-500 { color: #718096; }
        body.dark-mode .post-meta-item { background: rgba(74, 85, 104, 0.5); color: #cbd5e0; }
        body.dark-mode .tag-cloud-item { background: rgba(74, 85, 104, 0.4); border-color: rgba(74, 85, 104, 0.6); color: #cbd5e0; }
        body.dark-mode .tag-cloud-item:hover { background: rgba(99, 179, 237, 0.3); border-color: rgba(99, 179, 237, 0.6); color: #63b3ed; }
        body.dark-mode .hover\:bg-white\/50:hover { background: rgba(74, 85, 104, 0.4); }
        body.dark-mode .hover\:text-ios-blue:hover { color: #63b3ed; }
        body.dark-mode .subcategory-card { background: rgba(74, 85, 104, 0.4); color: #cbd5e0; }
        body.dark-mode .subcategory-card:hover { background: rgba(99, 179, 237, 0.3); color: #63b3ed; }
        body.dark-mode .bg-white\/50 { background: rgba(74, 85, 104, 0.3); }
        body.dark-mode .hover-lift:hover { box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4); }
        
        .search-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: none;
            align-items: flex-start;
            justify-content: center;
            padding-top: 15vh;
        }
        
        .search-modal.active { display: flex; animation: fadeIn 0.2s ease; }
        
        .search-container {
            width: 90%;
            max-width: 600px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: slideDown 0.3s ease;
        }
        
        body.dark-mode .search-container { background: rgba(26, 32, 44, 0.95); }
        
        .search-input-wrapper {
            padding: 1.2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }
        body.dark-mode .search-input-wrapper { border-color: rgba(74, 85, 104, 0.3); }
        
        .search-input {
            width: 100%;
            font-size: 1.1rem;
            border: none;
            outline: none;
            background: transparent;
            color: #1a202c;
        }
        body.dark-mode .search-input { color: #e2e8f0; }
        .search-input::placeholder { color: #a0aec0; }
        
        .search-results { max-height: 400px; overflow-y: auto; }
        
        .search-result-item {
            padding: 0.8rem 1.2rem;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        body.dark-mode .search-result-item { border-color: rgba(74, 85, 104, 0.2); }
        .search-result-item:hover { background: rgba(0, 122, 255, 0.1); }
        .search-result-item:last-child { border-bottom: none; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        
        .hover-lift { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hover-lift:hover { transform: translateY(-4px); box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15); }
        
        .weather-icon { font-size: 2rem; }
        .time-display { font-size: 2.5rem; font-weight: 900; letter-spacing: -0.05em; }
        .date-display { font-size: 0.9rem; color: #718096; }
        
        .quick-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .quick-action-btn:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }
        body.dark-mode .quick-action-btn { background: rgba(74, 85, 104, 0.4); }
        body.dark-mode .quick-action-btn:hover { background: rgba(74, 85, 104, 0.6); }
        
        .mini-card {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 1rem;
            transition: all 0.2s ease;
        }
        .mini-card:hover { background: rgba(255, 255, 255, 0.7); }
        body.dark-mode .mini-card { background: rgba(74, 85, 104, 0.4); }
        body.dark-mode .mini-card:hover { background: rgba(74, 85, 104, 0.6); }
        
        .reading-progress {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: rgba(255, 255, 255, 0.3);
            z-index: 100;
        }
        .reading-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #007AFF, #5856D6, #FF2D55);
            transition: width 0.1s ease;
        }
        
        .notification-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            width: 18px;
            height: 18px;
            background: #FF3B30;
            border-radius: 50%;
            font-size: 10px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: currentColor;
            animation: blink 1s infinite;
            margin-left: 2px;
        }
        @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }
        
        .scrollbar-thin {
            scrollbar-width: thin;
            scrollbar-color: rgba(0,0,0,0.2) transparent;
        }
        .scrollbar-thin::-webkit-scrollbar {
            width: 4px;
        }
        .scrollbar-thin::-webkit-scrollbar-track {
            background: transparent;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(0,0,0,0.2);
            border-radius: 2px;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(0,0,0,0.3);
        }
        body.dark-mode .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.2);
        }
        body.dark-mode .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.3);
        }
        
        @media (max-width: 1200px) {
            .three-column-layout { grid-template-columns: 240px 1fr; }
            .sidebar-right { display: none; }
        }
        
        @media (max-width: 768px) {
            .three-column-layout { grid-template-columns: 1fr; }
            .sidebar-left { display: none; }
        }
    </style>
</head>
<body class="p-3 md:p-4 text-gray-900 font-sans flex flex-col">

    <div class="glow-sphere sphere-1" id="bg1"></div>
    <div class="glow-sphere sphere-2" id="bg2"></div>
    
    <div class="wallpaper-carousel" id="wallpaperCarousel"></div>
    
    <div class="reading-progress"><div class="reading-progress-bar" id="readingProgress"></div></div>
    
    <div class="search-modal" id="searchModal">
        <div class="search-container">
            <div class="search-input-wrapper">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autofocus>
            </div>
            <div class="search-results" id="searchResults"></div>
        </div>
    </div>

    <div class="main-container">
        <header class="w-full flex justify-center mb-3 sticky top-0 z-50 flex-none px-3 md:px-4">
            <div id="navBox" class="dynamic-nav-container apple-glass-strong rounded-[2rem] px-6 py-3 flex justify-between items-center w-full max-w-7xl">
                <h1 id="navLogo" class="font-black text-lg tracking-tighter cursor-pointer flex items-center gap-2 transition-all duration-500">
                    <span class="status-dot"></span>
                    <span class="logo-text gradient-text-vibrant">aleee</span>
                </h1>
                <nav id="navLinks" class="hidden md:flex gap-6 font-bold text-sm opacity-60 transition-all duration-500">
                    <a href="#" class="hover:text-ios-blue transition-all">首页</a>
                    <a href="#" class="hover:text-ios-blue transition-all">归档</a>
                    <a href="#" class="hover:text-ios-blue transition-all">标签</a>
                    <a href="#" class="hover:text-ios-blue transition-all">关于</a>
                </nav>
                <div id="navBtnBox" class="flex items-center gap-2 transition-all duration-500">
                    <button id="randomPostBtn" class="p-2 rounded-full hover:bg-white/50 transition-all" title="随机文章">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                        </svg>
                    </button>
                    <button id="searchBtn" class="p-2 rounded-full hover:bg-white/50 transition-all relative" title="搜索">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </button>
                    <button id="themeToggle" class="p-2 rounded-full hover:bg-white/50 transition-all" title="切换主题">
                        <svg class="w-5 h-5 theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                        <svg class="w-5 h-5 theme-icon-dark hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                        </svg>
                    </button>
                    <button id="fontSizeBtn" class="p-2 rounded-full hover:bg-white/50 transition-all" title="字体大小">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                        </svg>
                    </button>
                    <button class="bg-black text-white px-4 py-1.5 rounded-full text-xs font-bold hover:shadow-xl active:scale-95 transition-all">订阅</button>
                </div>
            </div>
        </header>

        <div class="max-w-7xl w-full mx-auto three-column-layout flex-1 overflow-hidden px-3 md:px-4">
            
            <!-- 左侧栏 -->
            <aside class="sidebar-column sidebar-left space-y-3 pr-2">
                <!-- 个人信息卡片 -->
                <div class="apple-glass rounded-[2rem] p-5 reveal active border-b-8 border-white/20">
                    <div class="relative w-16 h-16 mb-4 group">
                        <img src="images/avatar.jpg" alt="aleee" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=aleee'" class="rounded-[1.5rem] bg-white p-1.5 border border-white/50 shadow-xl group-hover:rotate-6 transition-transform duration-500 w-full h-full object-cover">
                        <div class="absolute -bottom-1 -right-1 bg-green-400 w-4 h-4 rounded-full border-2 border-white/50 shadow-md"></div>
                    </div>
                    <h2 class="text-xl font-black mb-1 tracking-tight">aleee</h2>
                    <p class="text-gray-500 font-medium mb-4 text-sm italic">"记录学习，分享知识"</p>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-white/50 p-2.5 rounded-xl text-center">
                            <p class="text-lg font-black text-gray-800" id="totalPosts">0</p>
                            <p class="text-[10px] font-bold text-gray-400 uppercase">文章</p>
                        </div>
                        <div class="bg-blue-50/50 p-2.5 rounded-xl text-center">
                            <p class="text-lg font-black text-blue-600" id="totalCategories">0</p>
                            <p class="text-[10px] font-bold text-blue-400 uppercase">分类</p>
                        </div>
                    </div>
                </div>

                <!-- 时间天气卡片 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active">
                    <div class="text-center mb-3">
                        <div class="time-display gradient-text-vibrant" id="currentTime">00:00</div>
                        <div class="date-display" id="currentDate">2024年1月1日</div>
                    </div>
                    <div class="flex items-center justify-center gap-2 text-sm">
                        <span class="weather-icon" id="weatherIcon">🌤️</span>
                        <span id="weatherText">晴朗</span>
                        <span class="text-gray-500" id="weatherTemp">22°C</span>
                    </div>
                </div>

                <!-- 快捷操作 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active">
                    <h3 class="font-bold mb-3 text-gray-400 text-xs uppercase tracking-widest">快捷操作</h3>
                    <div class="grid grid-cols-4 gap-2">
                        <div class="quick-action-btn" onclick="scrollToTop()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
                            </svg>
                            <span class="text-[10px]">顶部</span>
                        </div>
                        <div class="quick-action-btn" onclick="scrollToBottom()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path>
                            </svg>
                            <span class="text-[10px]">底部</span>
                        </div>
                        <div class="quick-action-btn" onclick="toggleFullscreen()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path>
                            </svg>
                            <span class="text-[10px]">全屏</span>
                        </div>
                        <div class="quick-action-btn" onclick="sharePage()">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"></path>
                            </svg>
                            <span class="text-[10px]">分享</span>
                        </div>
                    </div>
                </div>

                <!-- 分类 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active">
                    <h3 class="font-bold mb-3 text-gray-400 text-xs uppercase tracking-widest">分类</h3>
                    <div id="sidebarCategories" class="space-y-1.5"></div>
                </div>
                
                <!-- 标签 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active">
                    <h3 class="font-bold mb-3 text-gray-400 text-xs uppercase tracking-widest">标签</h3>
                    <div id="sidebarTags" class="tag-cloud"></div>
                </div>
            </aside>

            <!-- 中间内容区 -->
            <main id="contentScroll" class="scroll-container">
                <div id="postsContainer" class="space-y-4"></div>
            </main>

            <!-- 右侧栏 -->
            <aside class="flex flex-col gap-3 pl-2 h-full">
                <!-- 热门文章卡片 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active flex-1 flex flex-col min-h-0">
                    <h3 class="font-bold mb-3 text-gray-400 text-xs uppercase tracking-widest flex-shrink-0">🔥 热门文章</h3>
                    <div id="hotPosts" class="space-y-2 overflow-y-auto flex-1 min-h-0 scrollbar-thin"></div>
                </div>

                <!-- 综合信息卡片 -->
                <div class="apple-glass rounded-[2rem] p-4 reveal active flex-1 flex flex-col min-h-0">
                    <h3 class="font-bold mb-3 text-gray-400 text-xs uppercase tracking-widest flex-shrink-0">📊 综合信息</h3>
                    <div class="overflow-y-auto flex-1 min-h-0 space-y-3 scrollbar-thin">
                        <!-- 公告 -->
                        <div class="pb-3 border-b border-white/20">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">公告</p>
                            <div class="text-sm text-gray-600">
                                <span id="typingText"></span><span class="typing-cursor"></span>
                            </div>
                        </div>
                        
                        <!-- 访客统计 -->
                        <div class="pb-3 border-b border-white/20">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">访客统计</p>
                            <div class="grid grid-cols-2 gap-2">
                                <div class="mini-card text-center">
                                    <p class="text-lg font-black text-ios-blue" id="todayVisitors">128</p>
                                    <p class="text-[10px] text-gray-400">今日访问</p>
                                </div>
                                <div class="mini-card text-center">
                                    <p class="text-lg font-black text-purple-500" id="totalVisitors">9,999</p>
                                    <p class="text-[10px] text-gray-400">总访问量</p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- 友情链接 -->
                        <div class="pb-3 border-b border-white/20">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">友情链接</p>
                            <div class="flex flex-wrap gap-1.5">
                                <a href="#" class="tag-cloud-item">GitHub</a>
                                <a href="#" class="tag-cloud-item">掘金</a>
                                <a href="#" class="tag-cloud-item">知乎</a>
                            </div>
                        </div>
                        
                        <!-- 版权信息 -->
                        <div class="text-center pt-1">
                            <p class="text-xs text-gray-400">© 2024 aleee</p>
                            <p class="text-xs text-gray-400">Powered by ❤️</p>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script>
        let allPosts = [];
        let allCategories = [];
        let currentCategory = 'all';
        let currentFontSize = 1;

        async function loadData() {
            try {
                const [postsResponse, categoriesResponse, tagsResponse] = await Promise.all([
                    fetch('data/posts.json'),
                    fetch('data/categories.json'),
                    fetch('data/tags.json').catch(() => null)
                ]);
                
                allPosts = await postsResponse.json();
                allCategories = await categoriesResponse.json();
                const tags = tagsResponse ? await tagsResponse.json() : [];
                
                document.getElementById('totalPosts').textContent = allPosts.length;
                document.getElementById('totalCategories').textContent = allCategories.children?.length || 0;
                
                renderSidebarCategories(allCategories);
                renderPosts(allPosts);
                renderSidebarTags(tags);
                renderHotPosts(allPosts);
            } catch (error) {
                console.error('加载数据失败:', error);
            }
        }

        function renderSidebarCategories(categories) {
            const container = document.getElementById('sidebarCategories');
            if (!categories.children || categories.children.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-sm">暂无分类</div>';
                return;
            }
            
            container.innerHTML = categories.children.map(cat => `
                <div class="subcategory-card" data-category="${cat.name}">
                    <span>📁</span>
                    <span>${cat.name}</span>
                    <span class="ml-auto text-xs opacity-60">(${cat.count || 0})</span>
                </div>
            `).join('');
            
            container.querySelectorAll('.subcategory-card').forEach(card => {
                card.addEventListener('click', () => {
                    const category = card.dataset.category;
                    filterByCategory(category);
                });
            });
        }

        function renderSidebarTags(tags) {
            const container = document.getElementById('sidebarTags');
            if (!tags || tags.length === 0) {
                container.innerHTML = '<div class="text-gray-400 text-sm">暂无标签</div>';
                return;
            }
            
            container.innerHTML = tags.slice(0, 12).map(tag => `
                <span class="tag-cloud-item">${tag.name || tag}</span>
            `).join('');
        }

        function renderHotPosts(posts) {
            const container = document.getElementById('hotPosts');
            const hotPosts = posts.slice(0, 5);
            
            container.innerHTML = hotPosts.map((post, index) => `
                <a href="post.html?id=${encodeURIComponent(post.id)}" class="mini-card block">
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-black ${index < 3 ? 'text-ios-blue' : 'text-gray-400'}">${index + 1}</span>
                        <span class="text-xs font-medium truncate">${post.title}</span>
                    </div>
                </a>
            `).join('');
        }

        function filterByCategory(category) {
            currentCategory = category;
            const filtered = category === 'all' 
                ? allPosts 
                : allPosts.filter(post => post.file.startsWith(category + '/'));
            renderPosts(filtered);
        }

        function renderPosts(posts) {
            const container = document.getElementById('postsContainer');
            
            if (posts.length === 0) {
                container.innerHTML = `
                    <div class="apple-glass rounded-[2rem] p-8 text-center">
                        <p class="text-gray-400 italic font-bold">暂无文章</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = posts.map((post, index) => `
                <article class="apple-glass rounded-[2rem] overflow-hidden group cursor-pointer reveal active hover-lift">
                    <a href="post.html?id=${encodeURIComponent(post.id)}" class="block text-inherit no-underline">
                        <div class="p-5">
                            <div class="flex items-center gap-2 mb-3">
                                <span class="text-xs font-black bg-black text-white px-3 py-1 rounded-full uppercase tracking-tighter">${post.file.split('/')[0]}</span>
                                <span class="text-xs text-gray-400">${new Date().toLocaleDateString()}</span>
                            </div>
                            <h3 class="text-lg font-black mb-2 tracking-tight leading-tight group-hover:text-ios-blue transition-colors">${post.title}</h3>
                            <p class="text-sm text-gray-500 mb-3 line-clamp-2">探索技术的边界，记录学习的点滴...</p>
                            <div class="flex items-center gap-2">
                                <span class="post-meta-item">📖 阅读</span>
                                <span class="post-meta-item">💬 评论</span>
                            </div>
                        </div>
                    </a>
                </article>
            `).join('');
        }

        function initWallpaperCarousel() {
            const carousel = document.getElementById('wallpaperCarousel');
            const wallpapers = [
                'images/bg1.png', 'images/bg2.png', 'images/wallpaper1.png',
                'images/wallpaper2.png', 'images/wallpaper3.jpg',
                'images/wallpaper4.jpg', 'images/wallpaper5.jpg'
            ];
            
            wallpapers.forEach((wallpaper, index) => {
                const slide = document.createElement('div');
                slide.className = 'wallpaper-slide';
                slide.style.backgroundImage = `url('${wallpaper}')`;
                carousel.appendChild(slide);
            });
            
            let currentSlide = 0;
            const slides = carousel.querySelectorAll('.wallpaper-slide');
            if (slides.length > 0) slides[0].classList.add('active');
            
            setInterval(() => {
                slides.forEach(slide => slide.classList.remove('active'));
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 10 * 60 * 1000);
        }
        
        function initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIconLight = document.querySelector('.theme-icon-light');
            const themeIconDark = document.querySelector('.theme-icon-dark');
            
            if (localStorage.getItem('theme') === 'dark') {
                document.body.classList.add('dark-mode');
                themeIconLight.classList.add('hidden');
                themeIconDark.classList.remove('hidden');
            }
            
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('dark-mode');
                const isDark = document.body.classList.contains('dark-mode');
                themeIconLight.classList.toggle('hidden', isDark);
                themeIconDark.classList.toggle('hidden', !isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                themeToggle.style.transform = 'rotate(360deg)';
                setTimeout(() => themeToggle.style.transform = 'rotate(0deg)', 300);
            });
        }
        
        function initSearch() {
            const searchBtn = document.getElementById('searchBtn');
            const searchModal = document.getElementById('searchModal');
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            
            searchBtn.addEventListener('click', () => {
                searchModal.classList.add('active');
                setTimeout(() => searchInput.focus(), 100);
            });
            
            searchModal.addEventListener('click', (e) => {
                if (e.target === searchModal) searchModal.classList.remove('active');
            });
            
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && searchModal.classList.contains('active')) {
                    searchModal.classList.remove('active');
                }
            });
            
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                const query = e.target.value.trim().toLowerCase();
                if (!query) {
                    searchResults.innerHTML = '<div style="padding: 2rem; text-align: center; color: #a0aec0;">输入关键词开始搜索</div>';
                    return;
                }
                searchTimeout = setTimeout(() => {
                    const results = allPosts.filter(post => 
                        post.title.toLowerCase().includes(query) || post.file.toLowerCase().includes(query)
                    );
                    searchResults.innerHTML = results.length === 0 
                        ? '<div style="padding: 2rem; text-align: center; color: #a0aec0;">未找到相关文章</div>'
                        : results.map(post => `
                            <a href="post.html?id=${encodeURIComponent(post.id)}" class="search-result-item block">
                                <div class="font-semibold text-gray-800">${post.title}</div>
                                <div class="text-sm text-gray-500 mt-1">📁 ${post.file.split('/')[0]}</div>
                            </a>
                        `).join('');
                }, 300);
            });
        }

        function initTimeWeather() {
            function updateTime() {
                const now = new Date();
                document.getElementById('currentTime').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                document.getElementById('currentDate').textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
            }
            updateTime();
            setInterval(updateTime, 1000);
        }

        function initTypingEffect() {
            const text = "欢迎来到我的博客！这里记录着我的学习与思考。";
            const container = document.getElementById('typingText');
            let index = 0;
            
            function type() {
                if (index < text.length) {
                    container.textContent += text[index];
                    index++;
                    setTimeout(type, 100);
                } else {
                    setTimeout(() => {
                        container.textContent = '';
                        index = 0;
                        type();
                    }, 3000);
                }
            }
            type();
        }

        function initReadingProgress() {
            const scrollContainer = document.getElementById('contentScroll');
            const progressBar = document.getElementById('readingProgress');
            
            scrollContainer.addEventListener('scroll', () => {
                const scrollTop = scrollContainer.scrollTop;
                const scrollHeight = scrollContainer.scrollHeight - scrollContainer.clientHeight;
                const progress = (scrollTop / scrollHeight) * 100;
                progressBar.style.width = progress + '%';
            });
        }

        function initRandomPost() {
            document.getElementById('randomPostBtn').addEventListener('click', () => {
                if (allPosts.length > 0) {
                    const randomPost = allPosts[Math.floor(Math.random() * allPosts.length)];
                    window.location.href = `post.html?id=${encodeURIComponent(randomPost.id)}`;
                }
            });
        }

        function initFontSize() {
            document.getElementById('fontSizeBtn').addEventListener('click', () => {
                currentFontSize = currentFontSize >= 3 ? 1 : currentFontSize + 1;
                const sizes = [1, 1.1, 1.2];
                document.getElementById('contentScroll').style.fontSize = sizes[currentFontSize - 1] + 'rem';
            });
        }

        function scrollToTop() { document.getElementById('contentScroll').scrollTo({ top: 0, behavior: 'smooth' }); }
        function scrollToBottom() { 
            const container = document.getElementById('contentScroll');
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' }); 
        }
        function toggleFullscreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }
        function sharePage() {
            if (navigator.share) {
                navigator.share({ title: document.title, url: window.location.href });
            } else {
                navigator.clipboard.writeText(window.location.href);
                alert('链接已复制到剪贴板！');
            }
        }

        const scrollContainer = document.getElementById('contentScroll');
        const navBox = document.getElementById('navBox');
        const navLogo = document.getElementById('navLogo');
        const navLinks = document.getElementById('navLinks');

        const mapRange = (value, inMin, inMax, outMin, outMax) => {
            const result = (value - inMin) * (outMax - outMin) / (inMax - inMin) + outMin;
            return Math.max(Math.min(result, Math.max(outMin, outMax)), Math.min(outMin, outMax));
        };

        scrollContainer.addEventListener('scroll', () => {
            const st = scrollContainer.scrollTop;
            const navWidth = mapRange(st, 0, 150, 100, 60);
            const navPadding = mapRange(st, 0, 150, 12, 6);
            const navRadius = mapRange(st, 0, 150, 32, 16);
            const navOpacity = mapRange(st, 0, 100, 1, 0.4);

            navBox.style.width = `${navWidth}%`;
            navBox.style.paddingTop = `${navPadding}px`;
            navBox.style.paddingBottom = `${navPadding}px`;
            navBox.style.borderRadius = `${navRadius}px`;
            navLinks.style.opacity = navOpacity;
            navLinks.style.transform = `translateX(${mapRange(st, 0, 150, 0, -15)}px)`;
            navLogo.style.transform = `scale(${mapRange(st, 0, 150, 1, 0.85)})`;

            document.getElementById('bg1').style.transform = `translateY(${st * 0.12}px)`;
            document.getElementById('bg2').style.transform = `translateY(${st * -0.12}px)`;

            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 80) el.classList.add('active');
            });
        });

        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX - window.innerWidth / 2) * 0.02;
            const y = (e.clientY - window.innerHeight / 2) * 0.02;
            navBox.style.boxShadow = `${x}px ${y + 10}px 40px -10px rgba(0,0,0,0.1)`;
        });

        loadData();
        initWallpaperCarousel();
        initThemeToggle();
        initSearch();
        initTimeWeather();
        initTypingEffect();
        initReadingProgress();
        initRandomPost();
        initFontSize();
    </script>
</body>
</html>
