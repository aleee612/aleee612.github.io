<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aleee - Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    
    /* 壁纸轮播容器 */
    .wallpaper-carousel {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -2;
      overflow: hidden;
    }
    
    .wallpaper-slide {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 2s ease-in-out;
    }
    
    .wallpaper-slide.active {
      opacity: 1;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(30px) saturate(180%);
      -webkit-backdrop-filter: blur(30px) saturate(180%);
      z-index: -1;
    }

    .main-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: 260px 1fr 240px;
      gap: 1rem;
      min-height: 0;
      margin-top: 1rem;
      overflow: hidden;
    }

    .sidebar-left, .sidebar-right {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-height: 0;
      overflow: hidden;
    }

    .sidebar-scroll {
      flex: 1;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
      min-height: 0;
    }

    .posts-scroll {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }

    .sidebar-scroll::-webkit-scrollbar,
    .posts-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb,
    .posts-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
    }

    .apple-glass {
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.1), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .apple-glass-strong {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(30px) saturate(200%);
      -webkit-backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.12),
                  inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .hover-lift {
      transition: all 0.3s ease;
    }
    
    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px -6px rgba(0, 0, 0, 0.12);
    }

    .text-ios-blue { 
      color: #007AFF; 
    }

    .gradient-text-vibrant {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 2px rgba(52, 199, 89, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .category-card {
      background: rgba(255, 255, 255, 0.5);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      transition: all 0.25s ease;
      cursor: pointer;
      border: 1px solid transparent;
    }
    
    .category-card:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(0, 122, 255, 0.3);
      transform: translateX(4px);
    }

    .category-card.active {
      background: rgba(0, 122, 255, 0.15);
      border-color: rgba(0, 122, 255, 0.4);
    }

    .subcategory-card {
      background: rgba(255, 255, 255, 0.4);
      border-radius: 10px;
      padding: 0.625rem 0.875rem;
      transition: all 0.2s ease;
      cursor: pointer;
      font-size: 0.9rem;
    }
    
    .subcategory-card:hover {
      background: rgba(255, 255, 255, 0.8);
      color: #007AFF;
    }

    .post-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.375rem 0.75rem;
      background: rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      font-size: 0.85rem;
      color: #718096;
    }

    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    
    .tag-cloud-item {
      padding: 0.375rem 0.75rem;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #4a5568;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .tag-cloud-item:hover {
      background: rgba(0, 122, 255, 0.2);
      border-color: rgba(0, 122, 255, 0.5);
      color: #007AFF;
    }

    .nav-category {
      padding: 0.5rem 1rem;
      border-radius: 999px;
      transition: all 0.25s ease;
      cursor: pointer;
      font-size: 0.95rem;
    }
    
    /* 深色主题样式 */
    body.dark-mode {
      color: #e2e8f0;
    }
    
    body.dark-mode .apple-glass {
      background: rgba(26, 32, 44, 0.8);
      border-color: rgba(74, 85, 104, 0.3);
    }
    
    body.dark-mode .apple-glass-strong {
      background: rgba(26, 32, 44, 0.9);
      border-color: rgba(74, 85, 104, 0.4);
    }
    
    body.dark-mode .gradient-text-vibrant {
      background: linear-gradient(135deg, #63b3ed 0%, #805ad5 50%, #d53f8c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    body.dark-mode .text-gray-800 {
      color: #e2e8f0;
    }
    
    body.dark-mode .text-gray-700 {
      color: #cbd5e0;
    }
    
    body.dark-mode .text-gray-600 {
      color: #a0aec0;
    }
    
    body.dark-mode .text-gray-500 {
      color: #718096;
    }
    
    body.dark-mode .post-meta-item {
      background: rgba(74, 85, 104, 0.5);
      color: #cbd5e0;
    }
    
    body.dark-mode .tag-cloud-item {
      background: rgba(74, 85, 104, 0.4);
      border-color: rgba(74, 85, 104, 0.6);
      color: #cbd5e0;
    }
    
    body.dark-mode .tag-cloud-item:hover {
      background: rgba(99, 179, 237, 0.3);
      border-color: rgba(99, 179, 237, 0.6);
      color: #63b3ed;
    }
    
    body.dark-mode .nav-category:hover {
      background: rgba(74, 85, 104, 0.4);
    }
    
    body.dark-mode .nav-category.active {
      background: rgba(99, 179, 237, 0.3);
      color: #63b3ed;
    }
    
    body.dark-mode .bg-white\/50 {
      background: rgba(74, 85, 104, 0.3);
    }
    
    body.dark-mode .hover\:bg-white\/50:hover {
      background: rgba(74, 85, 104, 0.4);
    }
    
    body.dark-mode .border-white\/50 {
      border-color: rgba(74, 85, 104, 0.3);
    }
    
    body.dark-mode .hover\:text-ios-blue:hover {
      color: #63b3ed;
    }
    
    /* 搜索模态框 */
    .search-modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: none;
      align-items: flex-start;
      justify-content: center;
      padding-top: 15vh;
    }
    
    .search-modal.active {
      display: flex;
      animation: fadeIn 0.2s ease;
    }
    
    .search-container {
      width: 90%;
      max-width: 600px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: slideDown 0.3s ease;
    }
    
    body.dark-mode .search-container {
      background: rgba(26, 32, 44, 0.95);
    }
    
    .search-input-wrapper {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    body.dark-mode .search-input-wrapper {
      border-color: rgba(74, 85, 104, 0.3);
    }
    
    .search-input {
      width: 100%;
      font-size: 1.25rem;
      border: none;
      outline: none;
      background: transparent;
      color: #1a202c;
    }
    
    body.dark-mode .search-input {
      color: #e2e8f0;
    }
    
    .search-input::placeholder {
      color: #a0aec0;
    }
    
    .search-results {
      max-height: 400px;
      overflow-y: auto;
    }
    
    .search-result-item {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid rgba(0, 0, 0, 0.05);
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    body.dark-mode .search-result-item {
      border-color: rgba(74, 85, 104, 0.2);
    }
    
    .search-result-item:hover {
      background: rgba(0, 122, 255, 0.1);
    }
    
    .search-result-item:last-child {
      border-bottom: none;
    }
    
    /* 动画 */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    
    /* 增强悬浮动画 */
    .hover-lift {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.15);
    }
    
    body.dark-mode .hover-lift:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
    }
    
    /* 点击波纹效果 */
    .ripple {
      position: relative;
      overflow: hidden;
    }
    
    .ripple::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }
    
    .ripple:active::after {
      width: 200px;
      height: 200px;
    }
    
    .nav-category:hover {
      background: rgba(255, 255, 255, 0.6);
    }
    
    .nav-category.active {
      background: rgba(0, 122, 255, 0.2);
      color: #007AFF;
    }

    @media (max-width: 1024px) {
      .content-area {
        grid-template-columns: 1fr;
      }
      .sidebar-left, .sidebar-right {
        display: none;
      }
    }
  </style>
</head>
<body>
  <!-- 壁纸轮播 -->
  <div class="wallpaper-carousel" id="wallpaperCarousel">
    <!-- 壁纸将通过JavaScript动态添加 -->
  </div>
  
  <!-- 搜索模态框 -->
  <div class="search-modal" id="searchModal">
    <div class="search-container">
      <div class="search-input-wrapper">
        <input type="text" class="search-input" id="searchInput" placeholder="搜索文章..." autofocus>
      </div>
      <div class="search-results" id="searchResults">
        <!-- 搜索结果将动态添加 -->
      </div>
    </div>
  </div>

  <div class="main-container">
    <header class="flex-none">
      <div class="apple-glass-strong rounded-full px-6 py-3 flex justify-between items-center">
        <h1 class="font-black text-lg tracking-tight cursor-pointer flex items-center gap-2">
          <span class="status-dot"></span>
          <span class="gradient-text-vibrant">aleee</span>
        </h1>
        
        <nav id="categoryNav" class="hidden md:flex gap-2 font-medium text-gray-600">
          <span class="nav-category active" data-cat="all">全部</span>
        </nav>
        
        <div class="flex items-center gap-2">
          <button id="searchBtn" class="p-2 rounded-full hover:bg-white/50 transition-all" title="搜索">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
          <button id="themeToggle" class="p-2 rounded-full hover:bg-white/50 transition-all" title="切换主题">
            <svg class="w-5 h-5 theme-icon-light" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
            </svg>
            <svg class="w-5 h-5 theme-icon-dark hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
          </button>
          <button class="bg-gray-900 text-white px-4 py-2 rounded-full text-sm font-bold hover:shadow-lg transition-all hover:scale-105">
            订阅
          </button>
        </div>
      </div>
    </header>

    <div class="content-area">
      <aside class="sidebar-left">
        <div class="apple-glass rounded-2xl p-5 border border-white/50">
          <div class="flex items-center gap-3">
            <div class="w-16 h-16 rounded-full overflow-hidden border-3 border-white/90 shadow-lg" style="border: 3px solid rgba(255, 255, 255, 0.9); box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.2);">
              <img src="images/avatar.jpg" alt="aleee" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=aleee'" style="width: 100%; height: 100%; object-fit: cover;">
            </div>
            <div>
              <h2 class="text-xl font-black tracking-tight">aleee</h2>
              <p class="text-sm text-gray-500">记录学习，分享知识</p>
            </div>
          </div>
          <div class="flex gap-3 mt-4">
            <div class="flex-1 bg-white/50 rounded-xl p-3 text-center">
              <p class="text-xs text-gray-400 mb-1">文章</p>
              <p class="text-lg font-black" id="totalPosts">0</p>
            </div>
            <div class="flex-1 bg-white/50 rounded-xl p-3 text-center">
              <p class="text-xs text-gray-400 mb-1">分类</p>
              <p class="text-lg font-black" id="totalCategories">0</p>
            </div>
          </div>
        </div>

        <div class="apple-glass rounded-2xl p-5 border border-white/50 flex-1 flex flex-col min-h-0">
          <h3 class="font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            📁 文章分类
          </h3>
          <div id="sidebarCategories" class="sidebar-scroll flex-1 space-y-2">
          </div>
        </div>
      </aside>
      
      <main class="posts-scroll" id="mainContent">
        <div id="postsList" class="space-y-3 pb-4">
          <div class="apple-glass rounded-2xl p-8 text-center">
            <div class="animate-pulse h-5 w-32 mx-auto rounded bg-gray-200 mb-4"></div>
            <div class="animate-pulse h-4 w-48 mx-auto rounded bg-gray-200"></div>
          </div>
        </div>
      </main>

      <aside class="sidebar-right">
        <div class="apple-glass rounded-2xl p-5 border border-white/50 flex-none">
          <h3 class="font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            📅 最新文章
          </h3>
          <div id="recentPosts" class="space-y-2">
          </div>
        </div>

        <div class="apple-glass rounded-2xl p-5 border border-white/50 flex-none">
          <h3 class="font-bold text-sm text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            🏷️ 热门标签
          </h3>
          <div id="sidebarTags" class="tag-cloud">
          </div>
        </div>

        <div class="apple-glass rounded-2xl p-5 border border-white/50 flex-none">
          <p class="text-sm text-gray-600 leading-relaxed">
            欢迎来到 aleee 的博客
          </p>
          <div class="mt-3 flex gap-2">
            <a href="#" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center hover:bg-white/90 transition-all text-base">
              ✉️
            </a>
            <a href="#" class="w-9 h-9 rounded-full bg-white/60 flex items-center justify-center hover:bg-white/90 transition-all text-base">
              👤
            </a>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    let allPosts = [];
    let allCategories = [];
    let currentCategory = 'all';

    async function loadData() {
      try {
        const [postsResponse, categoriesResponse, tagsResponse] = await Promise.all([
          fetch('data/posts.json'),
          fetch('data/categories.json'),
          fetch('data/tags.json').catch(() => null)
        ]);
        
        allPosts = await postsResponse.json();
        allCategories = await categoriesResponse.json();
        const tags = tagsResponse ? await tagsResponse.json() : [];
        
        document.getElementById('totalPosts').textContent = allPosts.length;
        document.getElementById('totalCategories').textContent = allCategories.children?.length || 0;
        
        renderNavCategories(allCategories);
        renderSidebarCategories(allCategories);
        renderPosts(allPosts);
        renderRecentPosts(allPosts);
        renderSidebarTags(tags);
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('postsList').innerHTML = `
          <div class="apple-glass rounded-2xl p-8 text-center text-gray-500">
            <p class="text-4xl mb-4">😔</p>
            <p>加载失败，请刷新页面重试</p>
          </div>
        `;
      }
    }

    function renderNavCategories(categories) {
      const nav = document.getElementById('categoryNav');
      if (!categories.children || categories.children.length === 0) return;
      
      const catsHtml = categories.children.slice(0, 6).map(cat => `
        <span class="nav-category" data-cat="${cat.name}" onclick="filterByCategory('${cat.name}')">
          ${cat.name}
        </span>
      `).join('');
      
      nav.innerHTML = '<span class="nav-category active" data-cat="all" onclick="filterByCategory(\'all\')">全部</span>' + catsHtml;
    }

    function renderSidebarCategories(categories) {
      const container = document.getElementById('sidebarCategories');
      if (!categories.children || categories.children.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400 p-2">暂无分类</p>';
        return;
      }
      
      container.innerHTML = categories.children.map(cat => `
        <div class="mb-2">
          <div class="category-card ${currentCategory === cat.name ? 'active' : ''}" 
               onclick="filterByCategory('${cat.name}')">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <span>📂</span>
                <span class="font-medium text-base">${cat.name}</span>
              </div>
              <span class="text-sm bg-white/60 px-2 py-0.5 rounded-full">${cat.count}</span>
            </div>
          </div>
          
          ${cat.children && cat.children.length > 0 ? `
            <div class="mt-2 ml-4 space-y-2">
              ${cat.children.map(child => `
                <div class="subcategory-card flex items-center gap-2 text-gray-600"
                     onclick="event.stopPropagation(); filterByCategory('${child.name}')">
                  <span>📄</span>
                  <span class="flex-1 truncate">${child.name}</span>
                  <span class="text-gray-400 text-sm">${child.count}</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    function filterByCategory(catName) {
      currentCategory = catName;
      
      document.querySelectorAll('.nav-category').forEach(el => {
        el.classList.toggle('active', el.dataset.cat === catName);
      });
      
      document.querySelectorAll('.category-card').forEach(el => {
        const catText = el.querySelector('span.font-medium')?.textContent;
        el.classList.toggle('active', catText === catName);
      });
      
      if (catName === 'all') {
        renderPosts(allPosts);
      } else {
        const filtered = allPosts.filter(post => {
          const postCat = post.file.split('/')[0];
          return postCat === catName || post.file.includes('/' + catName + '/');
        });
        renderPosts(filtered);
      }
    }

    function renderPosts(posts) {
      const container = document.getElementById('postsList');
      
      if (posts.length === 0) {
        container.innerHTML = `
          <div class="apple-glass rounded-2xl p-8 text-center text-gray-500">
            <p class="text-4xl mb-4">📝</p>
            <p>该分类下暂无文章</p>
          </div>
        `;
        return;
      }

      container.innerHTML = posts.map((post) => `
        <div class="apple-glass hover-lift rounded-2xl p-5 border border-white/50">
          <a href="post.html?id=${encodeURIComponent(post.id)}" class="block text-inherit no-underline">
            <div class="flex items-start justify-between gap-4">
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-base mb-3 text-gray-800 hover:text-ios-blue transition-colors line-clamp-2">${post.title}</h3>
                <div class="flex flex-wrap items-center gap-2 mb-3">
                  <span class="post-meta-item">
                    📁 ${post.file.split('/')[0]}
                  </span>
                </div>
                <p class="text-sm text-gray-500 line-clamp-2">
                  ${post.excerpt || '点击查看文章详情'}
                </p>
              </div>
              <div class="flex-shrink-0 w-10 h-10 rounded-full bg-gradient-to-br from-blue-400/20 to-purple-400/20 flex items-center justify-center">
                →
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }

    function renderRecentPosts(posts) {
      const container = document.getElementById('recentPosts');
      const recent = posts.slice(0, 5);
      
      container.innerHTML = recent.map(post => `
        <a href="post.html?id=${encodeURIComponent(post.id)}" class="flex items-center gap-3 p-2 rounded-xl hover:bg-white/50 transition-all group">
          <span>📄</span>
          <span class="text-sm text-gray-700 group-hover:text-ios-blue transition-colors line-clamp-2 flex-1">${post.title}</span>
        </a>
      `).join('');
    }

    function renderSidebarTags(tags) {
      const container = document.getElementById('sidebarTags');
      if (!tags || tags.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400">暂无标签</p>';
        return;
      }
      
      container.innerHTML = tags.slice(0, 12).map(tag => `
        <span class="tag-cloud-item" onclick="filterByTag('${tag.tag}')">
          ${tag.tag}
        </span>
      `).join('');
    }

    function filterByTag(tagName) {
      const filtered = allPosts.filter(post => 
        post.tags && post.tags.includes(tagName)
      );
      renderPosts(filtered);
    }

    // 壁纸轮播功能
    function initWallpaperCarousel() {
      const carousel = document.getElementById('wallpaperCarousel');
      
      // 壁纸列表 - 使用相对路径
      const wallpapers = [
        'images/bg1.png',
        'images/bg2.png',
        'images/wallpaper1.png',
        'images/wallpaper2.png',
        'images/wallpaper3.jpg',
        'images/wallpaper4.jpg',
        'images/wallpaper5.jpg'
      ];
      
      // 创建壁纸幻灯片
      wallpapers.forEach((wallpaper, index) => {
        const slide = document.createElement('div');
        slide.className = 'wallpaper-slide';
        slide.style.backgroundImage = `url('${wallpaper}')`;
        slide.dataset.index = index;
        carousel.appendChild(slide);
      });
      
      let currentSlide = 0;
      const slides = carousel.querySelectorAll('.wallpaper-slide');
      
      // 显示第一张壁纸
      if (slides.length > 0) {
        slides[0].classList.add('active');
      }
      
      // 轮播函数
      function nextSlide() {
        // 移除当前激活状态
        slides.forEach(slide => slide.classList.remove('active'));
        
        // 切换到下一张
        currentSlide = (currentSlide + 1) % slides.length;
        slides[currentSlide].classList.add('active');
        
        // 10分钟后切换到下一张
        setTimeout(nextSlide, 10 * 60 * 1000); // 10分钟
      }
      
      // 开始轮播
      setTimeout(nextSlide, 10 * 60 * 1000); // 10分钟后开始第一次切换
    }
    
    // 主题切换功能
    function initThemeToggle() {
      const themeToggle = document.getElementById('themeToggle');
      const themeIconLight = document.querySelector('.theme-icon-light');
      const themeIconDark = document.querySelector('.theme-icon-dark');
      
      // 检查本地存储的主题
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark-mode');
        themeIconLight.classList.add('hidden');
        themeIconDark.classList.remove('hidden');
      }
      
      themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark-mode');
        const isDark = document.body.classList.contains('dark-mode');
        
        // 切换图标
        themeIconLight.classList.toggle('hidden', isDark);
        themeIconDark.classList.toggle('hidden', !isDark);
        
        // 保存到本地存储
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        
        // 添加切换动画
        themeToggle.style.transform = 'rotate(360deg)';
        setTimeout(() => {
          themeToggle.style.transform = 'rotate(0deg)';
        }, 300);
      });
    }
    
    // 搜索功能
    function initSearch() {
      const searchBtn = document.getElementById('searchBtn');
      const searchModal = document.getElementById('searchModal');
      const searchInput = document.getElementById('searchInput');
      const searchResults = document.getElementById('searchResults');
      
      // 打开搜索
      searchBtn.addEventListener('click', () => {
        searchModal.classList.add('active');
        setTimeout(() => searchInput.focus(), 100);
      });
      
      // 点击背景关闭
      searchModal.addEventListener('click', (e) => {
        if (e.target === searchModal) {
          searchModal.classList.remove('active');
        }
      });
      
      // ESC键关闭
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && searchModal.classList.contains('active')) {
          searchModal.classList.remove('active');
        }
      });
      
      // 搜索输入
      let searchTimeout;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        const query = e.target.value.trim().toLowerCase();
        
        if (!query) {
          searchResults.innerHTML = '<div style="padding: 2rem; text-align: center; color: #a0aec0;">输入关键词开始搜索</div>';
          return;
        }
        
        searchTimeout = setTimeout(() => {
          const results = allPosts.filter(post => 
            post.title.toLowerCase().includes(query) ||
            post.file.toLowerCase().includes(query)
          );
          
          if (results.length === 0) {
            searchResults.innerHTML = '<div style="padding: 2rem; text-align: center; color: #a0aec0;">未找到相关文章</div>';
          } else {
            searchResults.innerHTML = results.map(post => `
              <a href="post.html?id=${encodeURIComponent(post.id)}" class="search-result-item block">
                <div class="font-semibold text-gray-800">${post.title}</div>
                <div class="text-sm text-gray-500 mt-1">📁 ${post.file.split('/')[0]}</div>
              </a>
            `).join('');
          }
        }, 300);
      });
      
      // 初始提示
      searchResults.innerHTML = '<div style="padding: 2rem; text-align: center; color: #a0aec0;">输入关键词开始搜索</div>';
    }

    // 初始化
    loadData();
    initWallpaperCarousel();
    initThemeToggle();
    initSearch();
  </script>
</body>
</html>
