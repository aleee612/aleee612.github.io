<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aleee - Blog</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: url('images/bg1.png') center/cover fixed no-repeat;
      color: #1a1a2e;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      z-index: -1;
    }

    /* 极致磨砂质感 */
    .apple-glass {
      background: rgba(255, 255, 255, 0.55);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .apple-glass-strong {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.1),
                  inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    /* 主容器 - 固定高度 */
    .main-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1rem;
    }

    /* 内容区域 - 可滚动 */
    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 280px;
      gap: 1rem;
      min-height: 0;
      margin-top: 1rem;
    }

    /* 侧边栏滚动区域 */
    .sidebar-scroll {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
      padding-right: 4px;
    }

    .sidebar-scroll::-webkit-scrollbar {
      width: 4px;
    }

    .sidebar-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .sidebar-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
    }

    /* 中间文章列表滚动 */
    .posts-scroll {
      height: 100%;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
      padding-right: 8px;
    }

    .posts-scroll::-webkit-scrollbar {
      width: 6px;
    }

    .posts-scroll::-webkit-scrollbar-track {
      background: transparent;
    }

    .posts-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
    }

    /* 卡片悬停效果 */
    .hover-lift {
      transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
    }
    
    .hover-lift:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
    }

    /* iOS 风格蓝色 */
    .text-ios-blue { 
      color: #007AFF; 
    }

    /* 渐变文字 */
    .gradient-text-vibrant {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 状态指示器 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* 分类卡片样式 */
    .category-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .category-card:hover {
      background: rgba(255, 255, 255, 0.8);
      transform: translateX(4px);
    }

    .category-card.active {
      background: rgba(0, 122, 255, 0.15);
      border-left: 3px solid #007AFF;
    }

    /* 子分类 */
    .subcategory-card {
      transition: all 0.2s ease;
      cursor: pointer;
    }
    
    .subcategory-card:hover {
      background: rgba(255, 255, 255, 0.6);
      color: #007AFF;
    }

    /* 文章元信息 */
    .post-meta-item {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 999px;
      font-size: 0.7rem;
      color: #718096;
    }

    /* 标签云 */
    .tag-cloud {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    
    .tag-cloud-item {
      padding: 0.3rem 0.6rem;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
      color: #4a5568;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .tag-cloud-item:hover {
      background: rgba(0, 122, 255, 0.15);
      border-color: rgba(0, 122, 255, 0.4);
      color: #007AFF;
    }

    /* 顶部导航分类 */
    .nav-category {
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      transition: all 0.3s ease;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .nav-category:hover {
      background: rgba(255, 255, 255, 0.5);
    }
    
    .nav-category.active {
      background: rgba(0, 122, 255, 0.15);
      color: #007AFF;
    }

    /* 头像 */
    .avatar-container {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 4px 15px -5px rgba(0, 0, 0, 0.2);
    }
    
    .avatar-container img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 响应式 */
    @media (max-width: 1024px) {
      .content-area {
        grid-template-columns: 1fr;
      }
      .sidebar-left, .sidebar-right {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="main-container">
    <!-- 顶部导航栏 -->
    <header class="flex-none">
      <div class="apple-glass-strong rounded-full px-6 py-3 flex justify-between items-center">
        <h1 class="font-black text-lg tracking-tight cursor-pointer flex items-center gap-2">
          <span class="status-dot"></span>
          <span class="gradient-text-vibrant">aleee</span>
        </h1>
        
        <!-- 分类导航 -->
        <nav id="categoryNav" class="hidden md:flex gap-1 font-medium text-sm text-gray-600">
          <span class="nav-category active" data-cat="all">全部</span>
        </nav>
        
        <button class="bg-gray-900 text-white px-4 py-1.5 rounded-full text-xs font-bold hover:shadow-xl transition-all">
          订阅
        </button>
      </div>
    </header>

    <!-- 主内容区 -->
    <div class="content-area">
      <!-- 左侧边栏 -->
      <aside class="sidebar-left flex flex-col gap-3">
        <!-- 个人信息 - 压缩 -->
        <div class="apple-glass rounded-2xl p-4 border border-white/50">
          <div class="flex items-center gap-3">
            <div class="avatar-container">
              <img src="images/avatar.jpg" alt="aleee" onerror="this.src='https://api.dicebear.com/7.x/avataaars/svg?seed=aleee'">
            </div>
            <div>
              <h2 class="text-lg font-black tracking-tight">aleee</h2>
              <p class="text-xs text-gray-500">记录学习，分享知识</p>
            </div>
          </div>
          <div class="flex gap-2 mt-3">
            <div class="flex-1 apple-glass rounded-lg p-2 text-center border border-white/30">
              <p class="text-xs text-gray-400">文章</p>
              <p class="text-base font-black" id="totalPosts">0</p>
            </div>
            <div class="flex-1 apple-glass rounded-lg p-2 text-center border border-white/30">
              <p class="text-xs text-gray-400">分类</p>
              <p class="text-base font-black" id="totalCategories">0</p>
            </div>
          </div>
        </div>

        <!-- 分类列表 - 可滚动 -->
        <div class="apple-glass rounded-2xl p-4 border border-white/50 flex-1 flex flex-col min-h-0">
          <h3 class="font-bold text-xs text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            <img src="icon/file.png" class="w-4 h-4" alt="分类"> 文章分类
          </h3>
          <div id="sidebarCategories" class="sidebar-scroll flex-1 space-y-1">
            <!-- 动态加载 -->
          </div>
        </div>
      </aside>
      
      <!-- 中间：文章列表 -->
      <main class="posts-scroll" id="mainContent">
        <div id="postsList" class="space-y-3 pb-4">
          <div class="apple-glass rounded-2xl p-8 text-center">
            <div class="animate-pulse h-4 w-32 mx-auto rounded bg-gray-200 mb-4"></div>
            <div class="animate-pulse h-3 w-48 mx-auto rounded bg-gray-200"></div>
          </div>
        </div>
      </main>

      <!-- 右侧边栏 -->
      <aside class="sidebar-right flex flex-col gap-3">
        <!-- 最新文章 -->
        <div class="apple-glass rounded-2xl p-4 border border-white/50 flex-1 flex flex-col min-h-0">
          <h3 class="font-bold text-xs text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            <img src="icon/calendar.png" class="w-4 h-4" alt="最新"> 最新文章
          </h3>
          <div id="recentPosts" class="sidebar-scroll space-y-2">
            <!-- 动态加载 -->
          </div>
        </div>

        <!-- 标签云 -->
        <div class="apple-glass rounded-2xl p-4 border border-white/50 flex-none">
          <h3 class="font-bold text-xs text-gray-500 mb-3 uppercase tracking-wider flex items-center gap-2">
            <img src="icon/discount.png" class="w-4 h-4" alt="标签"> 热门标签
          </h3>
          <div id="sidebarTags" class="tag-cloud">
            <!-- 动态加载 -->
          </div>
        </div>

        <!-- 关于 -->
        <div class="apple-glass rounded-2xl p-4 border border-white/50 flex-none">
          <p class="text-xs text-gray-600 leading-relaxed">
            欢迎来到 aleee 的博客
          </p>
          <div class="mt-3 flex gap-2">
            <a href="#" class="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center hover:bg-white/80 transition-all">
              <img src="icon/email.png" class="w-4 h-4" alt="邮箱">
            </a>
            <a href="#" class="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center hover:bg-white/80 transition-all">
              <img src="icon/user.png" class="w-4 h-4" alt="关于">
            </a>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    let allPosts = [];
    let allCategories = [];
    let currentCategory = 'all';

    // 加载数据
    async function loadData() {
      try {
        const [postsResponse, categoriesResponse, tagsResponse] = await Promise.all([
          fetch('data/posts.json'),
          fetch('data/categories.json'),
          fetch('data/tags.json').catch(() => null)
        ]);
        
        allPosts = await postsResponse.json();
        allCategories = await categoriesResponse.json();
        const tags = tagsResponse ? await tagsResponse.json() : [];
        
        document.getElementById('totalPosts').textContent = allPosts.length;
        document.getElementById('totalCategories').textContent = allCategories.children?.length || 0;
        
        renderNavCategories(allCategories);
        renderSidebarCategories(allCategories);
        renderPosts(allPosts);
        renderRecentPosts(allPosts);
        renderSidebarTags(tags);
      } catch (error) {
        console.error('加载数据失败:', error);
        document.getElementById('postsList').innerHTML = `
          <div class="apple-glass rounded-2xl p-8 text-center text-gray-500">
            <p class="text-4xl mb-4">😔</p>
            <p>加载失败，请刷新页面重试</p>
          </div>
        `;
      }
    }

    // 渲染顶部导航分类
    function renderNavCategories(categories) {
      const nav = document.getElementById('categoryNav');
      if (!categories.children || categories.children.length === 0) return;
      
      const catsHtml = categories.children.slice(0, 6).map(cat => `
        <span class="nav-category" data-cat="${cat.name}" onclick="filterByCategory('${cat.name}')">
          ${cat.name}
        </span>
      `).join('');
      
      nav.innerHTML = '<span class="nav-category active" data-cat="all" onclick="filterByCategory(\'all\')">全部</span>' + catsHtml;
    }

    // 渲染侧边栏分类 - 改为独立可点击的栏目
    function renderSidebarCategories(categories) {
      const container = document.getElementById('sidebarCategories');
      if (!categories.children || categories.children.length === 0) {
        container.innerHTML = '<p class="text-sm text-gray-400 p-2">暂无分类</p>';
        return;
      }
      
      container.innerHTML = categories.children.map(cat => `
        <div class="mb-2">
          <!-- 主分类 - 独立卡片 -->
          <div class="category-card rounded-lg p-2 ${currentCategory === cat.name ? 'active' : ''}" 
               onclick="filterByCategory('${cat.name}')">
            <div class="flex items-center justify-between">
              <div class="flex items-center gap-2">
                <img src="icon/file.png" class="w-4 h-4" alt="">
                <span class="font-medium text-sm">${cat.name}</span>
              </div>
              <span class="text-xs bg-white/50 px-2 py-0.5 rounded-full">${cat.count}</span>
            </div>
          </div>
          
          <!-- 子分类 - 独立可点击 -->
          ${cat.children && cat.children.length > 0 ? `
            <div class="mt-1 ml-4 space-y-1">
              ${cat.children.map(child => `
                <div class="subcategory-card rounded-md px-2 py-1.5 text-xs text-gray-600 flex items-center gap-1"
                     onclick="filterByCategory('${child.name}')">
                  <img src="icon/file.png" class="w-3 h-3" alt="">
                  <span>${child.name}</span>
                  <span class="text-gray-400">(${child.count})</span>
                </div>
              `).join('')}
            </div>
          ` : ''}
        </div>
      `).join('');
    }

    // 按分类筛选
    function filterByCategory(catName) {
      currentCategory = catName;
      
      // 更新导航激活状态
      document.querySelectorAll('.nav-category').forEach(el => {
        el.classList.toggle('active', el.dataset.cat === catName);
      });
      
      // 更新侧边栏激活状态
      document.querySelectorAll('.category-card').forEach(el => {
        const catText = el.querySelector('span.font-medium')?.textContent;
        el.classList.toggle('active', catText === catName);
      });
      
      // 筛选文章
      if (catName === 'all') {
        renderPosts(allPosts);
      } else {
        const filtered = allPosts.filter(post => {
          const postCat = post.file.split('/')[0];
          return postCat === catName || post.file.includes('/' + catName + '/');
        });
        renderPosts(filtered);
      }
    }

    // 渲染文章列表
    function renderPosts(posts) {
      const container = document.getElementById('postsList');
      
      if (posts.length === 0) {
        container.innerHTML = `
          <div class="apple-glass rounded-2xl p-8 text-center text-gray-500">
            <p class="text-4xl mb-4">📝</p>
            <p>该分类下暂无文章</p>
          </div>
        `;
        return;
      }

      container.innerHTML = posts.map((post, index) => `
        <div class="apple-glass hover-lift rounded-2xl p-4 border border-white/50">
          <a href="post.html?id=${encodeURIComponent(post.id)}" class="block text-inherit no-underline">
            <div class="flex items-start justify-between gap-3">
              <div class="flex-1 min-w-0">
                <h3 class="font-bold text-sm mb-2 text-gray-800 hover:text-ios-blue transition-colors line-clamp-2">${post.title}</h3>
                <div class="flex flex-wrap items-center gap-1.5 mb-2">
                  <span class="post-meta-item">
                    <img src="icon/file.png" class="w-3 h-3" alt="">
                    <span class="truncate max-w-[100px]">${post.file.split('/')[0]}</span>
                  </span>
                  <span class="post-meta-item">
                    <img src="icon/calendar.png" class="w-3 h-3" alt="">
                    <span>${formatDate(post.date)}</span>
                  </span>
                </div>
                <p class="text-xs text-gray-500 line-clamp-2">
                  ${post.excerpt || '点击查看文章详情'}
                </p>
              </div>
              <div class="flex-shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-blue-400/20 to-purple-400/20 flex items-center justify-center">
                <img src="icon/increase.png" class="w-4 h-4" alt="">
              </div>
            </div>
          </a>
        </div>
      `).join('');
    }

    // 渲染最新文章
    function renderRecentPosts(posts) {
      const container = document.getElementById('recentPosts');
      const recent = posts.slice(0, 8);
      
      container.innerHTML = recent.map(post => `
        <a href="post.html?id=${encodeURIComponent(post.id)}" class="flex items-center gap-2 p-1.5 rounded-lg hover:bg-white/50 transition-all group">
          <img src="icon/document.png" class="w-4 h-4 flex-shrink-0" alt="">
          <span class="text-xs text-gray-700 group-hover:text-ios-blue transition-colors line-clamp-2 flex-1">${post.title}</span>
        </a>
      `).join('');
    }

    // 渲染侧边栏标签
    function renderSidebarTags(tags) {
      const container = document.getElementById('sidebarTags');
      if (!tags || tags.length === 0) {
        container.innerHTML = '<p class="text-xs text-gray-400">暂无标签</p>';
        return;
      }
      
      container.innerHTML = tags.slice(0, 15).map(tag => `
        <span class="tag-cloud-item" onclick="filterByTag('${tag.tag}')">
          ${tag.tag}
        </span>
      `).join('');
    }

    // 按标签筛选
    function filterByTag(tagName) {
      const filtered = allPosts.filter(post => 
        post.tags && post.tags.includes(tagName)
      );
      renderPosts(filtered);
    }

    // 格式化日期
    function formatDate(dateString) {
      if (!dateString) return '无日期';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return dateString;
      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric',
        month: 'short',
        day: 'numeric'
      }).format(date);
    }

    // 初始化
    loadData();
  </script>
</body>
</html>
