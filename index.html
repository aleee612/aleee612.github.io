<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>aleee - Blog (Enhanced)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --apple-blue: #007AFF;
      --glass-blur: 30px;
    }

    * { box-sizing: border-box; }

    /* 壁纸轮播容器 */
    .wallpaper-carousel {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: -2;
      overflow: hidden;
    }
    
    .wallpaper-slide {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      transform: scale(1.05);
    }
    
    .wallpaper-slide.active {
      opacity: 1;
      transform: scale(1);
      transition: opacity 1.5s ease-in-out, transform 20s linear;
    }

    html, body {
      margin: 0; padding: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', -apple-system, sans-serif;
      color: #1a1a2e;
      background: #000;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(180%);
      z-index: -1;
      transition: backdrop-filter 0.5s ease;
    }

    .main-container {
      height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
      overflow: hidden;
    }

    .content-area {
      flex: 1;
      display: grid;
      grid-template-columns: 280px 1fr 260px;
      gap: 1.5rem;
      min-height: 0;
      margin-top: 1.5rem;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 滚动条美化 */
    .custom-scroll {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .custom-scroll::-webkit-scrollbar { display: none; }

    .apple-glass {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 4px 24px -4px rgba(0, 0, 0, 0.05);
    }

    .apple-glass-strong {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(30px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 8px 32px -8px rgba(0, 0, 0, 0.1);
    }

    /* 增强的交互动效 */
    .hover-lift {
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }
    .hover-lift:hover {
      transform: translateY(-6px) scale(1.01);
      background: rgba(255, 255, 255, 0.55);
      box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.15);
    }

    .btn-click { transition: transform 0.1s; }
    .btn-click:active { transform: scale(0.94); }

    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 12px #34c759;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.2); opacity: 0.7; }
    }

    /* 列表进场动画 */
    @keyframes slideInUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .post-enter {
      animation: slideInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) both;
    }

    /* 阅读进度条 */
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 3px;
      background: linear-gradient(to right, #007AFF, #5856D6);
      z-index: 100;
      width: 0%;
      transition: width 0.1s ease;
    }

    /* 深色模式修正 */
    body.dark-mode::before { background: rgba(0, 0, 0, 0.6); }
    body.dark-mode .apple-glass { background: rgba(20, 20, 25, 0.7); border-color: rgba(255,255,255,0.1); }
    body.dark-mode .apple-glass-strong { background: rgba(15, 15, 20, 0.85); border-color: rgba(255,255,255,0.15); }
    body.dark-mode .text-gray-800, body.dark-mode .text-gray-700 { color: #f1f5f9; }

    .nav-category {
      padding: 0.5rem 1.25rem;
      border-radius: 999px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
    }
    .nav-category.active {
      background: rgba(0, 122, 255, 0.2);
      color: #007AFF;
      box-shadow: inset 0 0 0 1px rgba(0, 122, 255, 0.3);
    }

    .gradient-text {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
  </style>
</head>
<body>
  <div id="progress-bar"></div>
  
  <div class="wallpaper-carousel" id="wallpaperCarousel"></div>
  
  <!-- 搜索模态框 -->
  <div class="fixed inset-0 bg-black/40 backdrop-blur-md z-[1000] hidden items-start justify-center pt-[15vh]" id="searchModal">
    <div class="w-full max-w-xl mx-4 bg-white/90 dark:bg-gray-900/90 rounded-3xl shadow-2xl overflow-hidden scale-95 transition-transform duration-300" id="searchBox">
      <div class="p-6 border-b border-gray-200/50 dark:border-gray-700/50">
        <input type="text" id="searchInput" class="w-full bg-transparent text-xl outline-none" placeholder="搜索知识、见解或灵感...">
      </div>
      <div id="searchResults" class="max-h-[60vh] overflow-y-auto p-2 custom-scroll"></div>
    </div>
  </div>

  <div class="main-container">
    <header class="flex-none">
      <div class="apple-glass-strong rounded-full px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="status-dot"></div>
          <h1 class="font-black text-xl tracking-tighter gradient-text">aleee</h1>
        </div>
        
        <nav id="categoryNav" class="hidden md:flex gap-1 font-medium text-gray-500"></nav>
        
        <div class="flex items-center gap-2">
          <button id="searchBtn" class="p-2.5 rounded-full hover:bg-white/40 btn-click transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
          </button>
          <button id="themeToggle" class="p-2.5 rounded-full hover:bg-white/40 btn-click transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
          </button>
          <button class="bg-gray-900 text-white px-5 py-2 rounded-full text-sm font-bold hover:shadow-xl btn-click transition-all">
            订阅
          </button>
        </div>
      </div>
    </header>

    <div class="content-area" id="layoutArea">
      <!-- 左边栏 -->
      <aside class="flex flex-col gap-5 min-h-0 sidebar-left">
        <div class="apple-glass rounded-3xl p-6 border-white/40">
          <div class="flex flex-col items-center text-center">
            <div class="w-20 h-20 rounded-full p-1 bg-gradient-to-tr from-blue-500 to-purple-500 mb-4">
              <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=aleee" class="w-full h-full rounded-full bg-white object-cover">
            </div>
            <h2 class="text-2xl font-black tracking-tight dark:text-white">aleee</h2>
            <p class="text-sm text-gray-500 mt-1">立身以立学为先</p>
          </div>
          <div class="grid grid-cols-2 gap-3 mt-6">
            <div class="bg-white/30 dark:bg-gray-800/30 rounded-2xl p-3 text-center">
              <span class="block text-xl font-black" id="totalPosts">0</span>
              <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Posts</span>
            </div>
            <div class="bg-white/30 dark:bg-gray-800/30 rounded-2xl p-3 text-center">
              <span class="block text-xl font-black" id="totalCategories">0</span>
              <span class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Cats</span>
            </div>
          </div>
        </div>

        <div class="apple-glass rounded-3xl p-5 flex-1 flex flex-col min-h-0">
          <h3 class="text-xs font-black text-gray-400 mb-4 uppercase tracking-[0.2em] px-2">Collections</h3>
          <div id="sidebarCategories" class="flex-1 overflow-y-auto custom-scroll space-y-2"></div>
        </div>
      </aside>
      
      <!-- 主内容区 -->
      <main class="overflow-y-auto custom-scroll" id="mainContent">
        <div id="postsList" class="space-y-4 pb-10"></div>
      </main>

      <!-- 右边栏 -->
      <aside class="flex flex-col gap-5 min-h-0 sidebar-right">
        <div class="apple-glass rounded-3xl p-5">
          <h3 class="text-xs font-black text-gray-400 mb-4 uppercase tracking-[0.2em]">Latest</h3>
          <div id="recentPosts" class="space-y-3"></div>
        </div>

        <div class="apple-glass rounded-3xl p-5">
          <h3 class="text-xs font-black text-gray-400 mb-4 uppercase tracking-[0.2em]">Tags</h3>
          <div id="sidebarTags" class="flex flex-wrap gap-2"></div>
        </div>

        <div class="apple-glass rounded-3xl p-6 mt-auto">
          <p class="text-sm text-gray-500 leading-relaxed font-medium">思维火花，代码人生。感谢在此相遇。</p>
          <div class="flex gap-2 mt-4">
            <button class="w-10 h-10 rounded-2xl bg-white/40 flex items-center justify-center hover:bg-white/60 transition-all">𝕏</button>
            <button class="w-10 h-10 rounded-2xl bg-white/40 flex items-center justify-center hover:bg-white/60 transition-all">github</button>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <!-- 动态控制悬浮面板 -->
  <div class="fixed bottom-8 left-8 z-50 flex items-center gap-3">
    <div class="apple-glass-strong rounded-2xl p-1.5 flex gap-1 border border-white/40 shadow-2xl">
      <button id="zenBtn" class="w-10 h-10 flex items-center justify-center hover:bg-white/50 rounded-xl transition-all btn-click" title="禅模式">🧘</button>
      <button id="blurBtn" class="w-10 h-10 flex items-center justify-center hover:bg-white/50 rounded-xl transition-all btn-click" title="调节模糊">🌫️</button>
      <button id="nextBgBtn" class="w-10 h-10 flex items-center justify-center hover:bg-white/50 rounded-xl transition-all btn-click" title="切换背景">🖼️</button>
    </div>
  </div>

  <!-- 回到顶部 -->
  <button id="backToTop" class="fixed bottom-8 right-8 w-12 h-12 bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl shadow-2xl items-center justify-center hidden hover-lift btn-click z-50">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"></path></svg>
  </button>

  <script>
    let allPosts = [];
    let allCategories = [];
    let currentCategory = 'all';

    // 核心数据加载
    async function loadData() {
      // 模拟数据 (生产环境请换回 fetch)
      allPosts = [
        { id: 1, title: "构建现代化的果味设计系统", excerpt: "探索沉浸式毛玻璃效果在Web开发中的极致应用...", file: "Design/AppleGlass", tags: ["Design", "CSS"] },
        { id: 2, title: "深入浅出 Tailwind CSS 核心原理", excerpt: "为什么 Utility-first 会改变我们的开发习惯？", file: "Tech/Frontend", tags: ["Frontend"] },
        { id: 3, title: "2024年个人知识体系构建指南", excerpt: "从碎片化阅读到深度思考，如何管理你的数字资产...", file: "Life/Thoughts", tags: ["Life"] }
      ];
      allCategories = { 
        children: [
          { name: "Design", count: 12, children: [] },
          { name: "Tech", count: 24, children: [{ name: "Frontend", count: 10 }] },
          { name: "Life", count: 8, children: [] }
        ] 
      };
      
      updateStats();
      renderNav();
      renderSidebarCats();
      renderPosts(allPosts);
      renderRecent(allPosts);
      renderTags(["Javascript", "React", "Next.js", "Design", "Productivity"]);
    }

    function updateStats() {
      document.getElementById('totalPosts').textContent = allPosts.length;
      document.getElementById('totalCategories').textContent = allCategories.children.length;
    }

    function renderNav() {
      const nav = document.getElementById('categoryNav');
      const cats = allCategories.children.slice(0, 5);
      nav.innerHTML = `<span class="nav-category active" data-cat="all" onclick="filter('all')">Discovery</span>` + 
        cats.map(c => `<span class="nav-category" data-cat="${c.name}" onclick="filter('${c.name}')">${c.name}</span>`).join('');
    }

    function renderPosts(posts) {
      const container = document.getElementById('postsList');
      container.innerHTML = posts.map((post, i) => `
        <article class="apple-glass hover-lift rounded-[2rem] p-7 cursor-pointer post-enter" style="animation-delay: ${i * 0.1}s">
          <div class="flex justify-between items-start gap-6">
            <div class="flex-1">
              <div class="flex items-center gap-2 mb-3">
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-500 bg-blue-500/10 px-2 py-1 rounded-md">
                  ${post.file.split('/')[0]}
                </span>
                <span class="text-[10px] text-gray-400 font-bold">5 MIN READ</span>
              </div>
              <h3 class="text-xl font-bold mb-3 tracking-tight text-gray-800 leading-snug">${post.title}</h3>
              <p class="text-gray-500 text-sm leading-relaxed line-clamp-2">${post.excerpt}</p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-gray-100/50 flex items-center justify-center shrink-0">
              <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 8l4 4m0 0l-4 4m4-4H3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
            </div>
          </div>
        </article>
      `).join('');
    }

    function filter(cat) {
      document.querySelectorAll('.nav-category').forEach(el => el.classList.toggle('active', el.dataset.cat === cat));
      const filtered = cat === 'all' ? allPosts : allPosts.filter(p => p.file.startsWith(cat));
      renderPosts(filtered);
    }

    // 交互：壁纸轮播
    function initWallpapers() {
      const carousel = document.getElementById('wallpaperCarousel');
      const images = [
        'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2000',
        'https://images.unsplash.com/photo-1494500764479-0c8f2919a3d8?auto=format&fit=crop&q=80&w=2000',
        'https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&q=80&w=2000'
      ];
      
      images.forEach((img, i) => {
        const div = document.createElement('div');
        div.className = `wallpaper-slide ${i===0?'active':''}`;
        div.style.backgroundImage = `url(${img})`;
        carousel.appendChild(div);
      });
    }

    function nextBg() {
      const slides = document.querySelectorAll('.wallpaper-slide');
      let activeIdx = Array.from(slides).findIndex(s => s.classList.contains('active'));
      slides[activeIdx].classList.remove('active');
      slides[(activeIdx + 1) % slides.length].classList.add('active');
    }

    // 交互：禅模式
    function toggleZen() {
      const layout = document.getElementById('layoutArea');
      const sidebars = document.querySelectorAll('.sidebar-left, .sidebar-right');
      const isZen = layout.style.gridTemplateColumns === '1fr';
      
      layout.style.gridTemplateColumns = isZen ? '280px 1fr 260px' : '1fr';
      sidebars.forEach(s => s.style.display = isZen ? 'flex' : 'none');
      document.getElementById('zenBtn').innerText = isZen ? '🧘' : '👁️';
    }

    // 辅助功能
    window.addEventListener('scroll', () => {
      // 进度条
      const scrolled = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
      document.getElementById('progress-bar').style.width = scrolled + '%';
      
      // 回到顶部
      document.getElementById('backToTop').style.display = window.scrollY > 400 ? 'flex' : 'none';
    }, {passive: true});

    // 搜索逻辑
    const searchBtn = document.getElementById('searchBtn');
    const searchModal = document.getElementById('searchModal');
    searchBtn.onclick = () => {
      searchModal.classList.remove('hidden');
      searchModal.classList.add('flex');
      setTimeout(() => document.getElementById('searchBox').classList.remove('scale-95'), 10);
      document.getElementById('searchInput').focus();
    };
    
    searchModal.onclick = (e) => { if(e.target === searchModal) searchModal.classList.add('hidden'); };

    // 初始化事件监听
    document.getElementById('zenBtn').onclick = toggleZen;
    document.getElementById('nextBgBtn').onclick = nextBg;
    document.getElementById('backToTop').onclick = () => window.scrollTo({top: 0, behavior: 'smooth'});
    document.getElementById('themeToggle').onclick = () => document.body.classList.toggle('dark-mode');
    
    let blurVal = 30;
    document.getElementById('blurBtn').onclick = () => {
      blurVal = blurVal > 60 ? 10 : blurVal + 15;
      document.documentElement.style.setProperty('--glass-blur', blurVal + 'px');
    };

    // 执行
    loadData();
    initWallpapers();

    // 简单的 Sidebar 渲染函数补全
    function renderSidebarCats() {
      const container = document.getElementById('sidebarCategories');
      container.innerHTML = allCategories.children.map(c => `
        <div class="group cursor-pointer p-3 rounded-2xl hover:bg-white/40 transition-all flex justify-between items-center" onclick="filter('${c.name}')">
          <div class="flex items-center gap-3">
            <span class="text-lg">📂</span>
            <span class="font-bold text-sm text-gray-700">${c.name}</span>
          </div>
          <span class="text-[10px] font-black text-gray-400 bg-gray-100 dark:bg-gray-800 px-2 py-1 rounded-lg">${c.count}</span>
        </div>
      `).join('');
    }

    function renderRecent(posts) {
      document.getElementById('recentPosts').innerHTML = posts.slice(0,3).map(p => `
        <div class="flex gap-3 items-center group cursor-pointer">
          <div class="w-1.5 h-1.5 rounded-full bg-blue-500"></div>
          <p class="text-xs font-bold text-gray-600 group-hover:text-blue-500 transition-colors line-clamp-1">${p.title}</p>
        </div>
      `).join('');
    }

    function renderTags(tags) {
      document.getElementById('sidebarTags').innerHTML = tags.map(t => `
        <span class="text-[10px] font-black uppercase tracking-widest px-3 py-1.5 bg-white/40 rounded-xl cursor-pointer hover:bg-blue-500 hover:text-white transition-all"># ${t}</span>
      `).join('');
    }
  </script>
</body>
</html>
