<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章 - aleee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
    }
    
    body {
      margin: 0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: url('images/bg1.png') center/cover fixed no-repeat;
      position: relative;
      overflow-x: hidden;
      color: #1a1a2e;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      z-index: -1;
    }

    /* 极致磨砂质感 */
    .apple-glass {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1), 
                  inset 0 1px 0 rgba(255, 255, 255, 0.8);
    }

    .apple-glass-strong {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 20px 50px -15px rgba(0, 0, 0, 0.1),
                  inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    /* 文章内容样式 */
    .post-content {
      line-height: 1.8;
      color: #2d3748;
    }
    
    .post-content h1 {
      font-size: 2rem;
      font-weight: 800;
      margin: 2rem 0 1rem;
      color: #1a202c;
      line-height: 1.3;
    }
    
    .post-content h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 1.75rem 0 0.875rem;
      color: #2d3748;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid rgba(0, 122, 255, 0.2);
    }
    
    .post-content h3 {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 1.5rem 0 0.75rem;
      color: #4a5568;
    }
    
    .post-content p {
      margin: 1rem 0;
    }
    
    .post-content ul, .post-content ol {
      margin: 1rem 0;
      padding-left: 1.5rem;
    }
    
    .post-content li {
      margin: 0.5rem 0;
    }
    
    .post-content code {
      background: rgba(0, 0, 0, 0.05);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 0.9em;
      color: #e53e3e;
    }
    
    .post-content pre {
      background: #1a202c;
      color: #e2e8f0;
      padding: 1.5rem;
      border-radius: 12px;
      overflow-x: auto;
      margin: 1.5rem 0;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
    }
    
    .post-content pre code {
      background: transparent;
      color: inherit;
      padding: 0;
    }
    
    .post-content blockquote {
      border-left: 4px solid #667eea;
      padding-left: 1rem;
      margin: 1.5rem 0;
      color: #718096;
      font-style: italic;
      background: rgba(102, 126, 234, 0.05);
      padding: 1rem 1rem 1rem 1.5rem;
      border-radius: 0 8px 8px 0;
    }
    
    .post-content a {
      color: #007AFF;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 122, 255, 0.3);
      transition: all 0.2s;
    }
    
    .post-content a:hover {
      border-bottom-color: #007AFF;
    }
    
    .post-content img {
      max-width: 100%;
      height: auto;
      border-radius: 12px;
      margin: 1.5rem 0;
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.2);
      display: block;
    }
    
    .post-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    
    .post-content th, .post-content td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .post-content th {
      background: rgba(102, 126, 234, 0.1);
      font-weight: 600;
    }
    
    .post-content tr:hover {
      background: rgba(0, 0, 0, 0.02);
    }

    /* 状态指示器 */
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #34c759;
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.2);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* 渐变文字 */
    .gradient-text-vibrant {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 50%, #4facfe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* 返回按钮 */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 999px;
      font-weight: 600;
      color: #4a5568;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .back-btn:hover {
      background: rgba(255, 255, 255, 0.9);
      transform: translateX(-4px);
      box-shadow: 0 4px 15px -3px rgba(0, 0, 0, 0.1);
    }

    /* 滚动条 */
    .custom-scroll {
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.15) transparent;
    }
    
    .custom-scroll::-webkit-scrollbar {
      width: 8px;
    }
    
    .custom-scroll::-webkit-scrollbar-track {
      background: transparent;
    }
    
    .custom-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.15);
      border-radius: 10px;
    }

    /* 加载动画 */
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }

    .loading-shimmer {
      background: linear-gradient(90deg, rgba(255,255,255,0.4) 25%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0.4) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .post-content h1 { font-size: 1.5rem; }
      .post-content h2 { font-size: 1.25rem; }
      .post-content h3 { font-size: 1.1rem; }
    }
  </style>
</head>
<body class="p-4 md:p-6">

  <!-- 顶部导航 -->
  <header class="w-full flex justify-center mb-6 sticky top-4 z-50">
    <div class="apple-glass-strong rounded-full px-6 py-3 flex justify-between items-center w-full max-w-5xl">
      <a href="index.html" class="flex items-center gap-2 font-black text-xl tracking-tight">
        <span class="status-dot"></span>
        <span class="gradient-text-vibrant">aleee</span>
      </a>
      
      <button onclick="history.back()" class="back-btn text-sm">
        ← 返回
      </button>
    </div>
  </header>

  <!-- 主内容区 -->
  <main class="max-w-4xl mx-auto">
    <!-- 文章容器 -->
    <article class="apple-glass rounded-[2rem] p-8 md:p-12 border border-white/50">
      <!-- 加载状态 -->
      <div id="loadingState">
        <div class="loading-shimmer h-8 w-3/4 rounded mb-6"></div>
        <div class="loading-shimmer h-4 w-1/2 rounded mb-8"></div>
        <div class="space-y-4">
          <div class="loading-shimmer h-4 w-full rounded"></div>
          <div class="loading-shimmer h-4 w-full rounded"></div>
          <div class="loading-shimmer h-4 w-3/4 rounded"></div>
        </div>
      </div>
      
      <!-- 文章内容 -->
      <div id="postContent" class="hidden">
        <!-- 文章头部 -->
        <header class="mb-8 pb-8 border-b border-gray-200/50">
          <h1 id="postTitle" class="text-3xl md:text-4xl font-black text-gray-900 mb-4 leading-tight"></h1>
          <div class="flex flex-wrap items-center gap-3 text-sm text-gray-500">
            <span id="postCategory" class="px-3 py-1 bg-blue-50 text-blue-600 rounded-full font-medium"></span>
            <span id="postDate" class="flex items-center gap-1">
              📅 <span></span>
            </span>
          </div>
        </header>
        
        <!-- 正文 -->
        <div id="postBody" class="post-content"></div>
        
        <!-- 文章底部 -->
        <footer class="mt-12 pt-8 border-t border-gray-200/50">
          <div class="flex items-center justify-between">
            <a href="index.html" class="back-btn">
              ← 返回首页
            </a>
            <div class="flex items-center gap-2 text-sm text-gray-500">
              <span>分享:</span>
              <button onclick="sharePost()" class="w-8 h-8 rounded-full bg-white/50 flex items-center justify-center hover:bg-white/80 transition-all">
                🔗
              </button>
            </div>
          </div>
        </footer>
      </div>
      
      <!-- 错误状态 -->
      <div id="errorState" class="hidden text-center py-12">
        <p class="text-6xl mb-4">😔</p>
        <h2 class="text-xl font-bold text-gray-700 mb-2">文章加载失败</h2>
        <p class="text-gray-500 mb-6">抱歉，无法找到该文章</p>
        <a href="index.html" class="back-btn inline-flex">
          ← 返回首页
        </a>
      </div>
    </article>
  </main>

  <script>
    // 获取 URL 参数
    function getUrlParam(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    // 格式化日期
    function formatDate(dateString) {
      if (!dateString) return '无日期';
      const date = new Date(dateString);
      if (isNaN(date.getTime())) return dateString;
      return new Intl.DateTimeFormat('zh-CN', {
        year: 'numeric',
        month: 'long',
        day: 'numeric'
      }).format(date);
    }

    // 简单的 Markdown 解析
    function parseMarkdown(content) {
      if (!content) return '';
      
      // 转义 HTML
      content = content.replace(/&/g, '&amp;')
                       .replace(/</g, '&lt;')
                       .replace(/>/g, '&gt;');
      
      // 代码块
      content = content.replace(/```(\w+)?\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
      
      // 行内代码
      content = content.replace(/`([^`]+)`/g, '<code>$1</code>');
      
      // 标题
      content = content.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      content = content.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      content = content.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      
      // 粗体和斜体
      content = content.replace(/\*\*\*(.*?)\*\*\*/g, '<strong><em>$1</em></strong>');
      content = content.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      content = content.replace(/\*(.*?)\*/g, '<em>$1</em>');
      
      // 链接
      content = content.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
      
      // 图片 - 修复路径问题
      content = content.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (match, alt, src) => {
        // 处理相对路径
        let imgSrc = src;
        if (!src.startsWith('http') && !src.startsWith('/')) {
          imgSrc = src;
        }
        return `<img src="${imgSrc}" alt="${alt}" onerror="this.style.display='none'" onload="this.style.display='block'">`;
      });
      
      // 引用
      content = content.replace(/^> (.*$)/gim, '<blockquote>$1</blockquote>');
      
      // 无序列表
      content = content.replace(/^\- (.*$)/gim, '<li>$1</li>');
      content = content.replace(/(<li>.*<\/li>\n)+/g, '<ul>$&</ul>');
      content = content.replace(/<\/ul>\n<ul>/g, '');
      
      // 有序列表
      content = content.replace(/^\d+\. (.*$)/gim, '<li>$1</li>');
      
      // 分隔线
      content = content.replace(/^---$/gim, '<hr style="border: none; border-top: 1px solid rgba(0,0,0,0.1); margin: 2rem 0;">');
      
      // 段落
      content = content.replace(/\n\n/g, '</p><p>');
      content = '<p>' + content + '</p>';
      
      // 清理空段落
      content = content.replace(/<p><\/p>/g, '');
      content = content.replace(/<p>(<h[1-6]>.*?<\/h[1-6]>)<\/p>/g, '$1');
      content = content.replace(/<p>(<pre>.*?<\/pre>)<\/p>/gs, '$1');
      content = content.replace(/<p>(<blockquote>.*?<\/blockquote>)<\/p>/gs, '$1');
      content = content.replace(/<p>(<ul>.*?<\/ul>)<\/p>/gs, '$1');
      content = content.replace(/<p>(<hr[^>]*>)<\/p>/g, '$1');
      content = content.replace(/<p>(<img[^>]*>)<\/p>/g, '$1');
      
      return content;
    }

    // 加载文章
    async function loadPost() {
      const postId = getUrlParam('id');
      
      if (!postId) {
        showError();
        return;
      }
      
      try {
        // 加载文章列表
        const response = await fetch('posts.json');
        const data = await response.json();
        
        const post = data.posts.find(p => p.id === postId);
        
        if (!post) {
          showError();
          return;
        }
        
        // 加载文章内容
        const contentResponse = await fetch(post.file);
        let content = '';
        
        if (contentResponse.ok) {
          content = await contentResponse.text();
          // 移除 YAML front matter
          content = content.replace(/^---[\s\S]*?---\n*/, '');
        }
        
        // 显示文章
        document.getElementById('postTitle').textContent = post.title;
        document.getElementById('postCategory').textContent = post.file.split('/')[0];
        document.getElementById('postDate').querySelector('span').textContent = formatDate(post.date);
        document.getElementById('postBody').innerHTML = parseMarkdown(content) || '<p>暂无内容</p>';
        
        // 更新页面标题
        document.title = post.title + ' - aleee';
        
        // 切换显示
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('postContent').classList.remove('hidden');
        
      } catch (error) {
        console.error('加载文章失败:', error);
        showError();
      }
    }

    // 显示错误
    function showError() {
      document.getElementById('loadingState').classList.add('hidden');
      document.getElementById('errorState').classList.remove('hidden');
    }

    // 分享文章
    function sharePost() {
      if (navigator.share) {
        navigator.share({
          title: document.getElementById('postTitle').textContent,
          url: window.location.href
        });
      } else {
        navigator.clipboard.writeText(window.location.href);
        alert('链接已复制到剪贴板');
      }
    }

    // 初始化
    loadPost();
  </script>
</body>
</html>
